<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Len_TECH | Professional Ecosystem</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- LINK CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<nav>
    <div class="logo-area">
        <div class="logo" onclick="window.scrollTo(0,0)">LEN_TECH</div>
        <div class="nav-copyright">© 2026 LEN Project</div>
    </div>
    <div class="nav-links">
        <a href="#home">Home</a>
        <a href="#gallery">Gallery</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </div>
    <div class="cart-trigger" onclick="openCart()">
        🛒 <span class="cart-count" id="cart-count">0</span>
    </div>
</nav>

<div class="sticky-footer">
    © 2026 Len_TECH Systems Ecosystem | St. Matthew College Research Project
</div>

<div id="cart-panel">
    <span class="close-cart" onclick="closeCart()">×</span>
    <h2 style="margin-bottom: 10px; font-size: 2rem;">Setup Tray</h2>
    <p style="color: #555; margin-bottom: 30px; font-size: 0.9rem;">Your selected high-performance parts.</p>

    <div id="cart-list" style="margin-bottom: 30px; height: 55vh; overflow-y: auto; padding-right: 10px;">
        <p style="color:#444; text-align: center; margin-top: 40px;">Tray is empty.</p>
    </div>

    <div style="border-top: 2px solid var(--glass); padding-top: 25px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <span style="color: #888;">Total Investment</span>
            <h2 id="cart-total" style="color: var(--primary); font-weight: 800;">₱0</h2>
        </div>
        <button class="btn" style="width: 100%;" onclick="alert('Order Sent to Processing!')">Initialize Checkout</button>
    </div>
</div>
